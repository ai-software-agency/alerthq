# alerthq configuration
# Copy this file to alerthq.config.yml and customize for your environment.
#
# See: https://github.com/ai-software-agency/alerthq

storage:
  provider: sqlite
  sqlite:
    path: ./alerthq.db

  # Or use PostgreSQL:
  # provider: postgresql
  # postgresql:
  #   url: ${DATABASE_URL}

providers:
  # AWS CloudWatch
  # Requires: AWS_REGION, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY in .env
  # Install:  pnpm add @alerthq/provider-aws-cloudwatch
  aws-cloudwatch:
    enabled: true
    regions:
      - us-east-1

  # Elastic Watcher + Kibana Rules
  # Install: pnpm add @alerthq/provider-elastic
  # elastic:
  #   enabled: true
  #   url: https://localhost:9200
  #   username: elastic
  #   password: ${ELASTIC_PASSWORD}

  # MongoDB Atlas
  # Install: pnpm add @alerthq/provider-mongodb-atlas
  # mongodb-atlas:
  #   enabled: true
  #   publicKey: ${ATLAS_PUBLIC_KEY}
  #   privateKey: ${ATLAS_PRIVATE_KEY}
  #   projectId: ${ATLAS_PROJECT_ID}

  # Azure Monitor
  # Install: pnpm add @alerthq/provider-azure-monitor
  # azure-monitor:
  #   enabled: true
  #   subscriptionId: ${AZURE_SUBSCRIPTION_ID}
