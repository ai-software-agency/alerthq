# alerthq configuration
# Copy this file to alerthq.config.yml and customize for your environment.
# Environment variables are supported via ${VAR} syntax.
#
# See: https://github.com/ai-software-agency/alerthq

storage:
  provider: sqlite
  sqlite:
    path: ./alerthq.db

  # Or use PostgreSQL:
  # provider: postgresql
  # postgresql:
  #   connectionString: ${DATABASE_URL}

providers:
  # AWS CloudWatch
  # Requires: AWS_REGION, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY in .env
  aws-cloudwatch:
    enabled: true
    regions:
      - ${AWS_REGION}
    # credentials:            # optional — falls back to AWS SDK credential chain
    #   accessKeyId: ${AWS_ACCESS_KEY_ID}
    #   secretAccessKey: ${AWS_SECRET_ACCESS_KEY}

  # Elastic Watcher + Kibana Rules
  # At least one of url or kibanaUrl is required, plus auth credentials in .env
  elastic:
    enabled: true
    # url: ${ELASTIC_URL}                   # optional — needed for Watcher alerts
    kibanaUrl: ${ELASTIC_KIBANA_URL} # optional — needed for Kibana alerting rules

    # Option 1: API key auth
    auth:
      type: apiKey
      apiKey: ${ELASTIC_API_KEY}

    # Option 2: Basic auth (uncomment below, comment out apiKey block above)
    # auth:
    #   type: basic
    #   username: ${ELASTIC_USERNAME}
    #   password: ${ELASTIC_PASSWORD}

  # MongoDB Atlas
  # Requires: ATLAS_PUBLIC_KEY, ATLAS_PRIVATE_KEY, ATLAS_PROJECT_ID in .env
  # mongodb-atlas:
  #   enabled: true
  #   publicKey: ${ATLAS_PUBLIC_KEY}
  #   privateKey: ${ATLAS_PRIVATE_KEY}
  #   projectIds:
  #     - ${ATLAS_PROJECT_ID}

  # Azure Monitor
  # Requires: AZURE_SUBSCRIPTION_ID in .env (uses DefaultAzureCredential for auth)
  # azure-monitor:
  #   enabled: true
  #   subscriptionIds:
  #     - ${AZURE_SUBSCRIPTION_ID}

  # Datadog
  # Requires: DD_API_KEY, DD_APP_KEY in .env
  # datadog:
  #   enabled: true
  #   apiKey: ${DD_API_KEY}
  #   appKey: ${DD_APP_KEY}
  #   site: datadoghq.com         # optional, defaults to datadoghq.com

  # GCP Cloud Monitoring
  # Requires: GCP_PROJECT_ID in .env
  # gcp-monitoring:
  #   enabled: true
  #   projectId: ${GCP_PROJECT_ID}
  #   keyFilename: ./gcp-sa-key.json   # optional

  # Grafana
  # Requires: GRAFANA_URL in .env + auth credentials
  # grafana:
  #   enabled: true
  #   url: ${GRAFANA_URL}
  #
  #   # Option 1: API key / service account token
  #   apiKey: ${GRAFANA_API_KEY}
  #
  #   # Option 2: Basic auth (uncomment below, comment out apiKey above)
  #   # basicAuth:
  #   #   username: ${GRAFANA_USERNAME}
  #   #   password: ${GRAFANA_PASSWORD}
