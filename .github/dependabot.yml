version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      aws-sdk:
        patterns:
          - '@aws-sdk/*'
      azure:
        patterns:
          - '@azure/*'
      elastic:
        patterns:
          - '@elastic/*'
      eslint:
        patterns:
          - 'eslint*'
          - '@typescript-eslint/*'
      vitest:
        patterns:
          - 'vitest'
          - '@vitest/*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
